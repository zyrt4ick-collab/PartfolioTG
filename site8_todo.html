<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>список дел — ZYRT4ICK</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#080808;color:#d0d0d0;font-family:'Space Mono',monospace;min-height:100vh;padding:3rem 1.5rem;position:relative}
  .watermark{position:fixed;bottom:1.2rem;right:1.5rem;font-size:.6rem;color:#1c1c1c;letter-spacing:.25em;pointer-events:none}
  .wrap{max-width:560px;margin:0 auto}
  header{border-bottom:1px solid #151515;padding-bottom:1.5rem;margin-bottom:2.5rem;display:flex;justify-content:space-between;align-items:flex-end}
  header h1{font-size:1rem;color:#fa2c5e;letter-spacing:.15em}
  .meta{font-size:.6rem;color:#2a2a2a;letter-spacing:.2em}
  .input-row{display:flex;gap:.8rem;margin-bottom:2.5rem}
  input{flex:1;background:#0d0d0d;border:1px solid #1e1e1e;color:#ccc;font-family:'Space Mono',monospace;font-size:.8rem;padding:.75rem 1rem;outline:none;transition:border-color .2s}
  input:focus{border-color:#fa2c5e}
  input::placeholder{color:#2a2a2a}
  .add-btn{background:none;border:1px solid #fa2c5e;color:#fa2c5e;font-family:'Space Mono',monospace;font-size:.65rem;padding:.75rem 1.2rem;cursor:pointer;letter-spacing:.1em;white-space:nowrap;transition:all .2s}
  .add-btn:hover{background:#fa2c5e;color:#000}
  .filters{display:flex;gap:.5rem;margin-bottom:2rem}
  .f-btn{background:none;border:1px solid #151515;color:#333;font-family:'Space Mono',monospace;font-size:.55rem;padding:.3rem .9rem;cursor:pointer;letter-spacing:.12em;transition:all .2s}
  .f-btn.active,.f-btn:hover{border-color:#fa2c5e;color:#fa2c5e}
  .task-list{display:flex;flex-direction:column;gap:.5rem}
  .task{display:flex;align-items:center;gap:1rem;padding:.9rem 1rem;background:#0b0b0b;border:1px solid #141414;transition:all .2s;position:relative}
  .task:hover{border-color:#1e1e1e}
  .task.done{opacity:.4}
  .task.done .task-text{text-decoration:line-through;color:#444}
  .check{width:16px;height:16px;border:1px solid #333;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .check:hover{border-color:#fa2c5e}
  .task.done .check{background:#fa2c5e20;border-color:#fa2c5e}
  .task-text{flex:1;font-size:.78rem;color:#bbb}
  .del-btn{background:none;border:none;color:#222;font-family:'Space Mono',monospace;font-size:.7rem;cursor:pointer;padding:.2rem;transition:color .2s;line-height:1}
  .del-btn:hover{color:#fa2c5e}
  .priority{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .priority.high{background:#fa2c5e}
  .priority.med{background:#fa8c2c}
  .priority.low{background:#2cfa8c}
  .empty-state{text-align:center;padding:3rem;font-size:.65rem;color:#1e1e1e;letter-spacing:.2em}
  .stats{display:flex;gap:2rem;margin-top:3rem;padding-top:1.5rem;border-top:1px solid #111}
  .stat{text-align:center;flex:1}
  .stat-n{font-size:1.5rem;font-weight:700;color:#fa2c5e}
  .stat-l{font-size:.55rem;color:#2a2a2a;letter-spacing:.2em}
  footer{margin-top:3rem;font-size:.6rem;color:#222}
  footer a{color:#222;text-decoration:none}
  footer a:hover{color:#fa2c5e}
  .priority-sel{display:flex;gap:.4rem;align-items:center}
  .p-dot{width:10px;height:10px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .1s}
  .p-dot.selected{border-color:#fff}
  .p-dot.high{background:#fa2c5e}
  .p-dot.med{background:#fa8c2c}
  .p-dot.low{background:#2cfa8c}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>// список дел</h1>
    <span class="meta" id="metaEl">0 задач</span>
  </header>

  <div class="input-row">
    <input type="text" id="taskInput" placeholder="что нужно сделать..." maxlength="80">
    <div class="priority-sel">
      <div class="p-dot high selected" data-p="high" onclick="selectP(this)" title="важно"></div>
      <div class="p-dot med" data-p="med" onclick="selectP(this)" title="средне"></div>
      <div class="p-dot low" data-p="low" onclick="selectP(this)" title="потом"></div>
    </div>
    <button class="add-btn" onclick="addTask()">+ добавить</button>
  </div>

  <div class="filters">
    <button class="f-btn active" onclick="setFilter(this,'all')">все</button>
    <button class="f-btn" onclick="setFilter(this,'active')">активные</button>
    <button class="f-btn" onclick="setFilter(this,'done')">сделано</button>
  </div>

  <div class="task-list" id="taskList">
    <div class="empty-state">пусто. напиши что-нибудь.</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="totalN">0</div><div class="stat-l">всего</div></div>
    <div class="stat"><div class="stat-n" id="doneN">0</div><div class="stat-l">сделано</div></div>
    <div class="stat"><div class="stat-n" id="leftN">0</div><div class="stat-l">осталось</div></div>
  </div>

  <footer><a href="https://spontaneous-pithivier-620100.netlify.app/" target="_blank">← главная</a></footer>
</div>
<div class="watermark">ZYRT4ICK</div>

<script>
let tasks = JSON.parse(localStorage.getItem('zyrt_tasks')||'[]');
let filter = 'all', selP = 'high';

function selectP(el){
  document.querySelectorAll('.p-dot').forEach(d=>d.classList.remove('selected'));
  el.classList.add('selected');
  selP = el.dataset.p;
}
function save(){localStorage.setItem('zyrt_tasks',JSON.stringify(tasks));}
function setFilter(btn,f){
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filter=f;render();
}
function addTask(){
  const v=document.getElementById('taskInput').value.trim();
  if(!v)return;
  tasks.unshift({id:Date.now(),text:v,done:false,p:selP});
  document.getElementById('taskInput').value='';
  save();render();
}
function toggle(id){
  tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t);
  save();render();
}
function del(id){
  tasks=tasks.filter(t=>t.id!==id);
  save();render();
}
function render(){
  const filtered=filter==='all'?tasks:filter==='done'?tasks.filter(t=>t.done):tasks.filter(t=>!t.done);
  const list=document.getElementById('taskList');
  if(!filtered.length){list.innerHTML='<div class="empty-state">пусто.</div>';} else {
    list.innerHTML=filtered.map(t=>`
      <div class="task ${t.done?'done':''}">
        <div class="priority ${t.p}"></div>
        <div class="check" onclick="toggle(${t.id})">${t.done?'✓':''}</div>
        <span class="task-text">${t.text}</span>
        <button class="del-btn" onclick="del(${t.id})">✕</button>
      </div>`).join('');
  }
  const done=tasks.filter(t=>t.done).length;
  document.getElementById('totalN').textContent=tasks.length;
  document.getElementById('doneN').textContent=done;
  document.getElementById('leftN').textContent=tasks.length-done;
  document.getElementById('metaEl').textContent=`${tasks.length} задач · ${done} готово`;
}
document.getElementById('taskInput').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
render();
</script>
</body>
</html>
