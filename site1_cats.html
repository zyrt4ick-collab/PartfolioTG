<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>факты о котах — ZYRT4ICK</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0a0a;--fg:#e0e0e0;--acc:#c0ff00;--dim:#444}
  body{background:var(--bg);color:var(--fg);font-family:'Space Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;position:relative;overflow-x:hidden}
  .watermark{position:fixed;bottom:1.2rem;right:1.5rem;font-size:.65rem;color:var(--dim);letter-spacing:.2em;opacity:.5;pointer-events:none;z-index:999}
  h1{font-size:clamp(1.2rem,4vw,2rem);color:var(--acc);letter-spacing:.15em;margin-bottom:.3rem;text-transform:lowercase}
  .sub{font-size:.7rem;color:var(--dim);letter-spacing:.3em;margin-bottom:3rem}
  .fact-box{max-width:540px;width:100%;border:1px solid #222;padding:2rem;position:relative;margin-bottom:1.5rem;transition:border-color .3s}
  .fact-box:hover{border-color:var(--acc)}
  .num{font-size:.6rem;color:var(--acc);letter-spacing:.2em;margin-bottom:.7rem}
  .fact{font-size:.88rem;line-height:1.8;color:#ccc}
  .btn{margin-top:2.5rem;background:none;border:1px solid var(--acc);color:var(--acc);font-family:'Space Mono',monospace;font-size:.75rem;padding:.7rem 2rem;cursor:pointer;letter-spacing:.2em;transition:all .2s;text-transform:lowercase}
  .btn:hover{background:var(--acc);color:#000}
  footer{margin-top:4rem;font-size:.6rem;color:var(--dim);letter-spacing:.2em}
  footer a{color:var(--dim);text-decoration:none}
  footer a:hover{color:var(--acc)}
</style>
</head>
<body>
<h1>факты о котах</h1>
<div class="sub">// by zyrt4ick · 2025</div>

<div class="fact-box" id="factBox">
  <div class="num">// факт #<span id="numDisplay">1</span></div>
  <div class="fact" id="factText">Коты проводят около 70% своей жизни во сне. Это примерно 13–16 часов в сутки.</div>
</div>

<button class="btn" onclick="nextFact()">следующий факт →</button>

<footer>
  <a href="https://spontaneous-pithivier-620100.netlify.app/" target="_blank">← назад на главную</a>
</footer>

<div class="watermark">ZYRT4ICK</div>

<script>
const facts = [
  "Коты проводят около 70% своей жизни во сне. Это примерно 13–16 часов в сутки.",
  "У котов нет вкусовых рецепторов, реагирующих на сладкое. Им буквально не интересен сахар.",
  "Кошачий нос уникален, как отпечаток пальца у человека. Два одинаковых не существует.",
  "Коты не могут мяукать друг другу. Мяуканье — исключительно для общения с людьми.",
  "Кошки приземляются на лапы благодаря безусловному рефлексу — «рефлексу переворота».",
  "Кошки видят в темноте в шесть раз лучше человека. Зрачки расширяются до максимума.",
  "Кот по имени Феликс работал начальником на вокзале в Великобритании и получал зарплату.",
  "Самый громкий кот в мире мурлыкал с громкостью 67.7 дБ — примерно как пылесос.",
  "Коты умеют прыгать на высоту, в пять раз превышающую их рост.",
  "Группа кошек называется «clowder» по-английски. Русского аналога почти нет."
];
let current = 0;
function nextFact(){
  current = (current+1)%facts.length;
  document.getElementById('factText').textContent = facts[current];
  document.getElementById('numDisplay').textContent = current+1;
  const box = document.getElementById('factBox');
  box.style.opacity='0';
  setTimeout(()=>box.style.opacity='1',150);
  box.style.transition='opacity .15s';
}
</script>
</body>
</html>
